name: Upload Python Package

on:
  push:
    branches:
      - master
      - ci-test

permissions:
  contents: write

jobs:
  build-n-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: 
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - uses: actions/checkout@v4
      - name: Running Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test dependencies
        run: |
          pip install --only-binary=numpy,scipy numpy scipy
          pip install -e .[test]
      - name: Run tests
        run: |
          python -m PyEMD.tests.test_all

  version-updated:
    runs-on: ubuntu-latest
    needs: build-n-test
    outputs:
      pyemd_version: ${{ steps.version.outputs.pyemd_version }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: version
        with:
          filters: |
            pyemd_version:
              - 'pyproject.toml'
      - name: Check if version is updated
        if: ${{ steps.version.outputs.pyemd_version ==  'true'}}
        run: echo "PyEMD version is updated"
      - name: Check if version is not updated
        if: ${{ steps.version.outputs.pyemd_version ==  'false'}}
        run: echo "PyEMD version is not updated"

  bump-version:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    needs: build-n-test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            code:
              - 'PyEMD/**/*.py'
              - 'pyproject.toml'
              - '!PyEMD/__init__.py'
      - name: Bump package version
        id: bump
        if: ${{ steps.changes.outputs.code == 'true' }}
        run: |
          BUMP=$(python .github/scripts/bump_version.py "${{ github.event.head_commit.message }}")
          echo "bump=$BUMP" >> $GITHUB_OUTPUT
          uv version --bump "$BUMP"
      - name: Commit version bump
        if: ${{ steps.changes.outputs.code == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore: bump package version"
          git push

  deploy:
    # Run 'deploy' job only if the package version is modified
    if: needs.version-updated.outputs.pyemd_version == 'true'
    needs: version-updated
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build
      - name: Build package
        run: python -m build
      - name: Publish package
        uses: pypa/gh-action-pypi-publish@27b31702a0e7fc50959f5ad993c78deac1bdfc29
        with:
          user: __token__
          password: ${{ secrets.EMD_PYPI_API_TOKEN }}

  create-release:
    # Create GitHub release when version is updated
    if: needs.version-updated.outputs.pyemd_version == 'true'
    needs: [version-updated, deploy]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Get version
        id: get_version
        run: |
          VERSION=$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: Release v${{ steps.get_version.outputs.version }}
          body: |
            ## PyEMD v${{ steps.get_version.outputs.version }}

            Install via pip:
            ```bash
            pip install EMD-signal==${{ steps.get_version.outputs.version }}
            ```
          generate_release_notes: true
